<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행신중학교 기록물 보관소</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 h-screen flex flex-col overflow-hidden">

    <!-- 상단 내비게이션 바 -->
    <header class="bg-slate-950 border-b border-slate-800 px-6 py-4 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <a href="index.html" class="text-slate-400 hover:text-white transition-colors text-sm flex items-center gap-1">
                <i class="fa-solid fa-arrow-left"></i> 메인으로
            </a>
            <div class="h-4 w-px bg-slate-800"></div>
            <span class="text-xs bg-slate-800 text-slate-300 font-medium px-2 py-0.5 rounded">행신중학교</span>
            <h1 id="pageTitle" class="text-lg font-bold text-white tracking-tight">연구학교 기록물</h1>
        </div>
        <div class="text-xs text-slate-500 font-mono" id="folderPathDisplay">images/</div>
    </header>

    <!-- 메인 작업 영역 -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- [왼쪽] 폴더 및 파일 탐색기 영역 -->
        <aside class="w-80 bg-slate-950/50 border-r border-slate-800 flex flex-col overflow-y-auto shrink-0">
            <div class="p-4 border-b border-slate-800/60 bg-slate-950/30">
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider flex items-center gap-1.5">
                    <i class="fa-solid fa-folder-open text-amber-500"></i> 디렉토리 탐색기
                </p>
            </div>
            <!-- 로딩 표시기 -->
            <div id="treeLoading" class="p-4 text-xs text-slate-500 flex items-center gap-2">
                <i class="fa-solid fa-circle-notch animate-spin text-indigo-500"></i> GitHub에서 이미지 목록을 불러오는 중...
            </div>
            <!-- 파일 구조 트리 -->
            <div class="p-4 space-y-1 text-sm select-none hidden" id="fileTree"></div>
        </aside>

        <!-- [오른쪽] 이미지 뷰어 영역 -->
        <main class="flex-1 bg-slate-900 flex flex-col items-center justify-center p-8 relative overflow-auto">
            <div id="noSelectMessage" class="text-slate-500 text-center">
                <i class="fa-regular fa-image text-5xl mb-3 block text-slate-600"></i>
                <p class="text-sm">왼쪽 탐색기에서 확인하실 이미지 파일을 선택해 주세요.</p>
            </div>
            
            <!-- 이미지 표시 공간 -->
            <div id="viewerContainer" class="hidden text-center max-w-full max-h-full flex flex-col items-center justify-center">
                <p class="text-xs text-slate-400 mb-2"><i class="fa-solid fa-magnifying-glass-plus"></i> 이미지를 클릭하면 전체 화면(새 창)으로 크게 볼 수 있습니다.</p>
                <div class="border border-slate-800 rounded-xl overflow-hidden bg-slate-950 shadow-2xl cursor-zoom-in max-w-4xl">
                    <img id="mainViewer" src="" alt="크게 보기" onclick="openFullImage()" class="max-w-full max-h-[70vh] object-contain hover:scale-[1.01] transition-transform duration-200">
                </div>
                <h2 id="currentImageTitle" class="text-sm font-semibold mt-4 text-slate-300 bg-slate-950/60 px-4 py-1.5 rounded-full border border-slate-800">파일명.jpg</h2>
            </div>
        </main>

    </div>

    <!-- 푸터 -->
    <footer class="border-t border-slate-950 bg-slate-950 py-3 text-center text-[10px] text-slate-600 shrink-0">
        © 2026 행신중학교 AI기반 서·논술형 평가 연구학교 Archive.
    </footer>

    <script>
        // ⚙️ [필수 설정] 선생님의 GitHub 아이디와 레포지토리 이름을 입력하세요!
        const GITHUB_USERNAME = 'jaealee-me'; // 예: 'haengshin-middle'
        const GITHUB_REPO = 'hsms2026';     // 예: 'ai-archive'

        // 메뉴별 매핑 정보 (상위 디렉토리 접근이 원천 차단된 루트 엔드포인트 역할)
        const CATEGORY_CONFIG = {
            onboarding: {
                title: '3-STEP 사전 온보딩 활동',
                path: 'images/3-STEP 사전 온보딩 활동'
            },
            training: {
                title: '교원 역량 강화',
                path: 'images/교사 역량 강화 연수'
            },
            writing: {
                title: '교과별 성장글쓰기',
                path: 'images/교과별 성장글쓰기'
            },
            project: {
                title: '1문항 다교과 융합 프로젝트',
                path: 'images/1문항 다교과 융합형 프로젝트'
            },
            openclass: {
                title: '수업공개의 날',
                path: 'images/연구학교 수업공개의 날'
            }
        };

        let currentSelectedImageUrl = '';
        const urlParams = new URLSearchParams(window.location.search);
        const currentCategory = urlParams.get('category') || 'onboarding';
        const config = CATEGORY_CONFIG[currentCategory];

        // 기본 정보 렌더링
        document.title = `[행신중] ${config.title} - 기록물 보관소`;
        document.getElementById('pageTitle').innerText = config.title;
        document.getElementById('folderPathDisplay').innerText = config.path + '/';

        // GitHub API를 통해 해당 폴더 안의 실제 파일 정보 실시간 취득
        async function fetchGitHubFiles() {
            // 한글 폴더명을 URL 표준 포맷으로 인코딩
            const encodedPath = encodeURIComponent(config.path);
            const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${encodedPath}`;

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('파일을 가져오는데 실패했습니다. 경로를 확인해 주세요.');
                
                const data = await response.json();
                
                // 폴더 내 파일 중 이미지 확장자(.jpg, .jpeg, .png, .gif, .webp)만 필터링
                const imageExtensions = ['jpg', 'jpeg', 'png', 'gif', 'webp'];
                const imageFiles = data.filter(file => {
                    if (file.type !== 'file') return false;
                    const ext = file.name.split('.').pop().toLowerCase();
                    return imageExtensions.includes(ext);
                });

                renderFileTree(imageFiles);
            } catch (error) {
                console.error(error);
                document.getElementById('treeLoading').innerHTML = `<span class="text-rose-400"><i class="fa-solid fa-circle-exclamation"></i> 오류: 데이터를 불러올 수 없습니다.</span>`;
            }
        }

        // 받아온 실제 파일로 탐색기 트리 빌드
        function renderFileTree(files) {
            const loadingIndicator = document.getElementById('treeLoading');
            const treeContainer = document.getElementById('fileTree');
            
            loadingIndicator.classList.add('hidden');
            treeContainer.classList.remove('hidden');
            treeContainer.innerHTML = '';

            // [상위 디렉토리 제한 규정] 
            // 최상위 노드를 지정된 path 하위로 고정하여 상위(`..`) 이동 버튼이나 구조를 원천적으로 배제함
            const folderNode = document.createElement('div');
            folderNode.className = "flex items-center gap-2 text-amber-400 font-semibold py-1.5 px-1";
            folderNode.innerHTML = `<i class="fa-solid fa-folder-open text-base"></i> <span class="truncate">${config.path.split('/').pop()}</span>`;
            treeContainer.appendChild(folderNode);

            const fileListContainer = document.createElement('div');
            fileListContainer.className = "pl-5 space-y-0.5 border-l border-slate-800 ml-2.5 mt-1";

            if (files.length === 0) {
                fileListContainer.innerHTML = `<div class="text-xs text-slate-500 py-2">폴더 내에 등록된 이미지 파일이 없습니다.</div>`;
                treeContainer.appendChild(fileListContainer);
                return;
            }

            files.forEach(file => {
                const fileItem = document.createElement('div');
                fileItem.className = "file-item flex items-center gap-2 text-slate-400 hover:text-white hover:bg-slate-800/50 py-1.5 px-2 rounded cursor-pointer transition-colors break-all";
                fileItem.innerHTML = `<i class="fa-regular fa-image text-indigo-400"></i> <span>${file.name}</span>`;
                
                // 파일 클릭 시 해당 이미지의 GitHub CDN 생주소(download_url) 주입
                fileItem.onclick = function() {
                    document.querySelectorAll('.file-item').forEach(el => el.classList.remove('bg-indigo-600/30', 'text-white', 'border-l-2', 'border-indigo-500'));
                    fileItem.classList.add('bg-indigo-600/30', 'text-white', 'border-l-2', 'border-indigo-500');
                    
                    selectImage(file.download_url, file.name);
                };

                fileListContainer.appendChild(fileItem);
            });
            treeContainer.appendChild(fileListContainer);
        }

        // 우측 뷰어 렌더링
        function selectImage(downloadUrl, fileName) {
            document.getElementById('noSelectMessage').classList.add('hidden');
            const viewerContainer = document.getElementById('viewerContainer');
            viewerContainer.classList.remove('hidden');

            const mainViewer = document.getElementById('mainViewer');
            mainViewer.src = downloadUrl; // 샘플 제거 후 100% 실제 원본 이미지 주소 매칭
            
            currentSelectedImageUrl = downloadUrl;
            document.getElementById('currentImageTitle').innerText = fileName;
        }

        // 이미지 클릭 시 별도 전체화면 창 활성화
        function openFullImage() {
            if (currentSelectedImageUrl) {
                const newWindow = window.open("", "_blank");
                newWindow.document.write(`
                    <html>
                    <head>
                        <title>${document.getElementById('currentImageTitle').innerText} - 전체보기</title>
                        <style>
                            body { margin: 0; background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
                            img { max-width: 100%; max-height: 100vh; object-fit: contain; cursor: zoom-out; }
                        </style>
                    </head>
                    <body>
                        <img src="${currentSelectedImageUrl}" onclick="window.close()" title="클릭하시면 창이 닫힙니다.">
                    </body>
                    </html>
                `);
            }
        }

        // 로드 시 실행
        window.onload = function() {
            fetchGitHubFiles();
        };
    </script>
</body>
</html>
